ll="#bdf0ff" text-anchor="start" font-weight="400">  orders.customer_id</text><text x="30" y="424" font-size="13" fill="#bdf0ff" text-anchor="start" font-weight="400">WHERE orders.status = 'shipped'|</text><rect x="16" y="474" width="150" height="48" rx="10" fill="#3ff0a8" opacity="1"/><text x="91" y="504" font-size="13" fill="#04221a" text-anchor="middle" font-weight="700">▶ Run & Check</text><rect x="176" y="474" width="90" height="48" rx="10" fill="#161d3b" stroke="#2a3566" stroke-width="1" opacity="1"/><text x="221" y="504" font-size="12" fill="#e8edff" text-anchor="middle" font-weight="700">💡 Hint</text>
